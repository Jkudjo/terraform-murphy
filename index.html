<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glorious Harvest</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: whitee
            is
            font-family: 'Arial', sans-serif;
            position: relative;
        }
        
        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100px; /* Adjust as needed */
            height: auto;
        }
        
        .bulb-container {
            position: relative;
            margin-bottom: 30px;
        }
        
        .cord {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, #555, #333);
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .bulb {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #fff9c0, #ffd700);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px #ffd700;
            animation: glow 2s infinite alternate;
        }
        
        @keyframes glow {
            from {
                box-shadow: 0 0 15px #ffd700;
            }
            to {
                box-shadow: 0 0 30px #ffd700;
            }
        }
        
        .bulb:after {
            content: "";
            position: absolute;
            width: 18px;
            height: 12px;
            background: linear-gradient(to bottom, #c0c0c0, #a0a0a0);
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 5px 5px;
        }
        
        .text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .we-are {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 10px;
            color: #D4AF37;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        
        .years {
            font-size: 28px;
            margin-bottom: 30px;
            color: #D4AF37;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        
        .website {
            font-size: 16px;
            letter-spacing: 1px;
            color: #D4AF37;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Add your logo image here - replace 'logo.png' with your actual file -->
    <img class="logo" src="logo.png" alt="Company Logo">
    
    <div class="bulb-container">
        <div class="cord"></div>
        <div class="bulb"></div>
    </div>
    <div class="text-block">
        <div class="we-are">W E A R E</div>
        <div class="years">21 YEARS</div>
        <div class="website">WWW.GLORIOUSHARVEST.ORG</div>
    </div>
</body>
</html>
